<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860" role="img">
<title>Beggar 默认平衡方案多 Agent 架构图</title>
<desc>默认 balanced 方案：用户发起需求，Architect GLM-5.2 方案设计，双 Reviewer 跨厂商并行评审方案（Phase 2 闸门），通过后三级 Coder 按复杂度分派，Tester 验证，双 Reviewer 交叉审查代码，3轮全败后 Leader 先自救，自救耗尽才激活 Director（Opus-4.7-1M）。Director 6类裁决：A/B/C 自动恢复，D/E/F 上升用户。</desc>
